<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Analyzer</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="card">
    <h2>Student Analyzer</h2>

    <input type="number" id="m1" placeholder="Mark 1">
    <input type="number" id="m2" placeholder="Mark 2">
    <input type="number" id="m3" placeholder="Mark 3">

    <br>
    <button onclick="analyze()">Analyze</button>

    <div id="result"></div>
</div>

<script>
function analyze() {
    let marks = [
        parseInt(document.getElementById("m1").value),
        parseInt(document.getElementById("m2").value),
        parseInt(document.getElementById("m3").value)
    ];

    fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({marks: marks})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.result;
    });
}
</script>

</body>
</html>
