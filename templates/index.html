<script>
function analyze() {
    let m1 = document.getElementById("m1").value;
    let m2 = document.getElementById("m2").value;
    let m3 = document.getElementById("m3").value;

    if (!m1 || !m2 || !m3) {
        alert("Please enter all marks");
        return;
    }

    let marks = [parseInt(m1), parseInt(m2), parseInt(m3)];

    fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ marks: marks })
    })
    .then(res => res.json())
    .then(data => {
        if (data.result) {
            document.getElementById("result").innerText = data.result;
        } else {
            document.getElementById("result").innerText = data.error;
        }
    })
    .catch(err => {
        document.getElementById("result").innerText = "Request failed";
        console.error(err);
    });
}
</script>
